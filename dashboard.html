<!DOCTYPE html>
<html>
<head>
  <title>Dashboard Biosilver</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

<h2>Panel de Administración</h2>

<table class="table table-bordered mt-4">
<thead class="table-dark">
<tr>
<th>Fecha</th>
<th>Nombre</th>
<th>Plaga</th>
<th>Ubicación</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>

</div>

<script>
const sheetID = "1866638803";
const url = `https://opensheet.elk.sh/${sheetID}/Form%20Responses%201`;

fetch(url)
.then(res => res.json())
.then(data => {
  let tabla = document.getElementById("tabla");

  data.forEach(row => {
    tabla.innerHTML += `
      <tr>
        <td>${row.Timestamp}</td>
        <td>${row.Nombre}</td>
        <td>${row["Tipo de plaga"]}</td>
        <td>${row.Ubicación}</td>
      </tr>
    `;
  });
});
</script>

</body>
</html>
